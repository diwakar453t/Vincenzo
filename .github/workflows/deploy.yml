name: Deploy to Azure and Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_BACKEND_URL: https://preskool-api-backend.azurewebsites.net

jobs:
  validate-secrets:
    name: Validate Required Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check Deployment Secrets
        run: |
          MISSING=()
          [ -z "${{ secrets.AZURE_CLIENT_ID }}" ] && MISSING+=("AZURE_CLIENT_ID")
          [ -z "${{ secrets.AZURE_TENANT_ID }}" ] && MISSING+=("AZURE_TENANT_ID")
          [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ] && MISSING+=("AZURE_SUBSCRIPTION_ID")
          [ -z "${{ secrets.AZURE_WEBAPP_NAME }}" ] && MISSING+=("AZURE_WEBAPP_NAME")
          [ -z "${{ secrets.VERCEL_TOKEN }}" ] && MISSING+=("VERCEL_TOKEN")
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ] && MISSING+=("VERCEL_ORG_ID")
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ] && MISSING+=("VERCEL_PROJECT_ID")
          [ -z "${{ secrets.DATABASE_URL }}" ] && MISSING+=("DATABASE_URL")
          [ -z "${{ secrets.JWT_SECRET_KEY }}" ] && MISSING+=("JWT_SECRET_KEY")
          [ -z "${{ secrets.ENCRYPTION_MASTER_KEY }}" ] && MISSING+=("ENCRYPTION_MASTER_KEY")

          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ All required secrets are present."

  deploy-backend:
    name: Deploy Backend to Azure
    needs: validate-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Backend to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: ./backend

      - name: Verify Health Check
        run: |
          URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/v1/health"
          echo "Checking health at $URL..."
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $URL || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed: 200 OK"
              curl -s $URL | python3 -m json.tool
              exit 0
            fi
            echo "Attempt $i: Status=$STATUS. Waiting..."
            sleep 5
          done
          echo "❌ Health check failed after deployment"
          exit 1

      - name: Run Database Migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          ENCRYPTION_MASTER_KEY: ${{ secrets.ENCRYPTION_MASTER_KEY }}
        working-directory: backend
        run: |
          echo "Running Alembic migrations..."
          alembic upgrade head
          echo "✅ Migrations complete."
        continue-on-error: true  # Don't block if already applied

      - name: Seed Initial Users
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          ENCRYPTION_MASTER_KEY: ${{ secrets.ENCRYPTION_MASTER_KEY }}
          OTEL_ENABLED: "false"
          APP_ENV: production
        working-directory: backend
        run: |
          echo "Seeding initial demo accounts..."
          python seeds/seed_data.py
          echo "✅ Seeding complete."
        continue-on-error: true  # Don't fail if data already exists

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: validate-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node Modules
        working-directory: frontend
        run: npm ci

      - name: Build Frontend with Production API URL
        working-directory: frontend
        env:
          VITE_API_URL: https://preskool-api-backend.azurewebsites.net/api/v1
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"
