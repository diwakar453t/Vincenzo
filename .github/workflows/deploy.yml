name: Deploy to Azure and Vercel

on:
  push:
    branches: [main]

jobs:
  validate-secrets:
    name: Validate Required Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check Deployment Secrets
        run: |
          MISSING=()
          [ -z "${{ secrets.AZURE_CLIENT_ID }}" ] && MISSING+=("AZURE_CLIENT_ID")
          [ -z "${{ secrets.AZURE_TENANT_ID }}" ] && MISSING+=("AZURE_TENANT_ID")
          [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ] && MISSING+=("AZURE_SUBSCRIPTION_ID")
          [ -z "${{ secrets.AZURE_WEBAPP_NAME }}" ] && MISSING+=("AZURE_WEBAPP_NAME")
          [ -z "${{ secrets.VERCEL_TOKEN }}" ] && MISSING+=("VERCEL_TOKEN")
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ] && MISSING+=("VERCEL_ORG_ID")
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ] && MISSING+=("VERCEL_PROJECT_ID")

          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ All required secrets are present."

  deploy-backend:
    name: Deploy Backend to Azure
    needs: validate-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Backend to Azure App Service
        uses: Wandalen/wretry.action@v1.3.0
        with:
          action: azure/webapps-deploy@v2
          with: |
            app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
            package: ./backend
          attempt_limit: 3
          attempt_delay: 10000

      - name: Verify Health Check
        run: |
          # Wait up to 60 seconds for the app to start
          URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/v1/health"
          echo "Checking health at $URL..."
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $URL || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed: 200 OK"
              exit 0
            fi
            echo "Waiting for app to start... (Status: $STATUS)"
            sleep 5
          done
          echo "❌ Health check failed after deployment"
          exit 1

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: validate-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node Modules
        working-directory: frontend
        run: npm ci

      - name: Deploy to Vercel
        uses: Wandalen/wretry.action@v1.3.0
        with:
          action: amondnet/vercel-action@v25
          with: |
            vercel-token: ${{ secrets.VERCEL_TOKEN }}
            vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
            vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
            working-directory: frontend
            vercel-args: "--prod"
          attempt_limit: 3
          attempt_delay: 10000
