name: Deploy PreSkool ERP to Azure & Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build-backend:
    name: Backend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: preskool-erp/backend

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run PyTest
        run: |
          # Ensure tests pass before deployment
          # Setting a dummy DB URL for test parsing if needed
          export DATABASE_URL="sqlite:///./test.db"
          export SECRET_KEY="testsecret"
          pytest

  deploy-backend:
    name: Deploy API to Azure
    runs-on: ubuntu-latest
    needs: test-and-build-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push container to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
          
      - name: Docker build & push
        run: |
          cd preskool-erp/backend
          docker build . -t ${{ secrets.ACR_LOGIN_SERVER }}/preskool-backend:${{ github.sha }}
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/preskool-backend:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/preskool-backend:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/preskool-backend:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/preskool-backend:latest

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/preskool-backend:${{ github.sha }}

  trigger-vercel-frontend:
    name: Trigger Frontend Vercel Deploy
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Wait for Backend Health Check
        run: |
          echo "Waiting for API to stabilize..."
          sleep 15
          curl -f ${{ secrets.BACKEND_PRODUCTION_URL }}/api/v1/health || echo "Health check failed or unavailable, but proceeding..."

      - name: Trigger Vercel Build Webhook
        run: |
          curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
