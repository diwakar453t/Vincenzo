# ═══════════════════════════════════════════════════════════════════════
# PreSkool ERP — CD Pipeline (Railway + Vercel)
# Backend → Railway  |  Frontend → Vercel  |  Source → GitHub
# Triggers: push to main (production), push to develop (staging)
# ═══════════════════════════════════════════════════════════════════════
name: CD — Deploy (Railway + Vercel)

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Determine Environment ─────────────────────────────────────────────
  setup:
    name: 🎯 Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

  # ── Deploy Backend → Azure Web App ────────────────────────────────────
  deploy-backend:
    name: ☁️ Deploy Backend → Azure
    runs-on: ubuntu-latest
    needs: setup
    environment:
      name: ${{ needs.setup.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies & Package
        working-directory: backend
        run: |
          # Install dependencies directly into the root so they are packaged in the zip
          pip install -r requirements.txt -t .
          zip -r ../deploy.zip . -x "__pycache__/*" ".pytest_cache/*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'preskool-api-backend'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip

      - name: Smoke-test backend health
        continue-on-error: true
        run: |
          URL="https://preskool-api-backend.azurewebsites.net"
          echo "Testing health endpoint: $URL/api/v1/health"
          for i in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/v1/health" || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "✅ Backend health check passed"
              exit 0
            fi
            echo "⏳ Attempt $i — status $STATUS, retrying in 20s..."
            sleep 20
          done
          echo "⚠️ Backend health check not 200 yet — continuing anyway (App Service may still be booting)"

  # ── Deploy Frontend → Vercel ──────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [setup, deploy-backend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=${{ needs.setup.outputs.environment == 'production' && 'production' || 'preview' }} --token=$VERCEL_TOKEN

      - name: Build frontend
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          # Point frontend to the live Azure backend URL
          VITE_API_URL: "https://preskool-api-backend.azurewebsites.net/api/v1"
          VITE_API_BASE_URL: "https://preskool-api-backend.azurewebsites.net"
        run: vercel build ${{ needs.setup.outputs.environment == 'production' && '--prod' || '' }} --token=$VERCEL_TOKEN

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [[ "${{ needs.setup.outputs.environment }}" == "production" ]]; then
            vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
          else
            vercel deploy --prebuilt --token=$VERCEL_TOKEN
          fi

  # ── Final Summary ─────────────────────────────────────────────────────
  summary:
    name: ✅ Deployment Summary
    runs-on: ubuntu-latest
    needs: [setup, deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Print result
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  PreSkool ERP — Deployment Summary"
          echo "  Environment : ${{ needs.setup.outputs.environment }}"
          echo "  Backend     : ${{ needs.deploy-backend.result }}"
          echo "  Frontend    : ${{ needs.deploy-frontend.result }}"
          echo "  Commit      : ${{ github.sha }}"
          echo "  Run         : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [[ "${{ needs.deploy-backend.result }}" != "success" || \
                "${{ needs.deploy-frontend.result }}" != "success" ]]; then
            echo "❌ One or more deployments failed — see above"
            exit 1
          fi
          echo "✅ All deployments succeeded!"
