name: CI — Lint & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-backend:
    name: Backend Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Check
        working-directory: backend
        run: ruff check .
      - name: Run Ruff Format Check
        working-directory: backend
        run: ruff format --check .

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build

  verify-backend-deps:
    name: Verify Backend Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Verify critical imports
        run: |
          python -c "import asyncpg; print(f'✅ asyncpg {asyncpg.__version__} installed')"
          python -c "import sqlalchemy; print(f'✅ sqlalchemy {sqlalchemy.__version__} installed')"
          python -c "import fastapi; print(f'✅ fastapi {fastapi.__version__} installed')"
          echo "All critical dependencies verified."

  test-backend:
    name: Backend Unit & API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run pytest test suite
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./test_preskool.db
          JWT_SECRET_KEY: test-secret-key-for-ci-testing-only-32bytes!
          ENCRYPTION_MASTER_KEY: test-encryption-key-for-ci-testing-only!!
          OTEL_ENABLED: "false"
          RATE_LIMIT_PER_MINUTE: "100000"
          DEBUG: "true"
        run: |
          python -m pytest app/tests/ -x --tb=short -q
          echo "✅ All backend tests passed"
